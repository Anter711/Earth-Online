<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球 Online 成就统计</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #0f1118;
            color: #f0f0f0;
            min-height: 100vh;
            padding: 20px 15px;
        }
        .wrap {
            max-width: 750px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 25px;
            font-size: 24px;
        }

        /* 昵称界面 */
        .start-page {
            text-align: center;
            margin-top: 60px;
        }
        .nick-input {
            padding: 14px 16px;
            width: 240px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .start-btn {
            padding: 14px 30px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .progress-bar {
            text-align: center;
            color: #999;
            margin-bottom: 20px;
        }

        /* 题目卡片 + 动画容器 */
        .q-box-wrapper {
            animation: fadeInUp 0.45s ease forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .q-box {
            background: #1c1f29;
            border-radius: 16px;
            padding: 30px 25px;
        }
        .q-title {
            font-size: 20px;
            font-weight: bold;
            line-height: 1.6;
            margin-bottom: 10px;
            color: #fff;
        }
        .q-desc {
            font-size: 15px;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-row {
            display: flex;
            gap: 16px;
        }
        .single-btn-row{
            display:flex;
            justify-content:center;
        }
        .opt-btn {
            flex: 1;
            border: none;
            padding: 14px 0;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .yes-btn {
            background: #ffd700;
            color: #000;
        }
        .no-btn {
            background: #333846;
            color: #fff;
        }
        .single-yes{
            width:200px;
        }
        .result-page {
            display: none;
        }
        .result-head {
            text-align: center;
            color: #ffffff;
            font-size: 22px;
            margin-bottom: 10px;
            font-weight:bold;
        }
        .total-info {
            text-align: center;
            margin-bottom: 25px;
            font-size: 16px;
            color:#eee;
        }
        .ach-list {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }
        .ach-item {
            background: #1c1f29;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            color:#eee;
            line-height: 1.4;
        }
        .done {
            border: 1px solid #ffd700;
        }
        .undone {
            opacity: 0.55;
        }
        .save-img-btn {
            display: block;
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="wrap">
    <h1>地球 Online 成就统计</h1>

    <!-- 昵称输入 -->
    <div class="start-page" id="startPage">
        <input type="text" class="nick-input" id="nickInput" placeholder="请输入你的昵称">
        <br>
        <button class="start-btn" onclick="startTest()">开始测试</button>
    </div>

    <!-- 答题界面 -->
    <div id="answerPage" style="display:none;">
        <div class="progress-bar" id="progressText"></div>
        <div id="qContainer"></div> <!-- 动画容器 -->
    </div>

    <!-- 结果界面 -->
    <div id="resultPage" class="result-page">
        <div id="saveBox" style="background:#0f1118;padding:20px;border-radius:16px;">
            <div class="result-head">你的地球Online成就清单</div>
            <div class="total-info" id="totalInfo"></div>
            <div class="ach-list" id="achList"></div>
        </div>
        <button class="save-img-btn" onclick="saveResultImage()">保存结果图片到本地</button>
    </div>
</div>

<script>
const achData = [
    {name:"主角登场",desc:"成功注册并登录地球Online服务器"},
    {name:"亲密羁绊",desc:"完成婚姻系统绑定，缔结永久伴侣关系"},
    {name:"爱你老妈明天见",desc:"给妈妈准备一份礼物和一束鲜花"},
    {name:"资深玩家",desc:"电子游戏游玩时长突破1000小时"},
    {name:"岁岁平安",desc:"一生无重大波折灾祸，生活安稳顺遂"},
    {name:"独处常态",desc:"习惯一个人吃饭看电影，享受独处生活"},
    {name:"零负债人生",desc:"无房贷、车贷、网贷，真正无债一身轻"},
    {name:"流泪体质",desc:"看电影、电视、玩游戏，容易被剧情打动落泪"},
    {name:"无声的陪伴",desc:"养宠物超过5年，朝夕相伴"},
    {name:"徒步旅人",desc:"完成超三天的长途徒步路线行程"},
    {name:"电玩收藏家",desc:"入手多款正版游戏及游戏设备"},
    {name:"嗜睡者",desc:"平均每日睡眠时间超过10小时"},
    {name:"落日收藏家",desc:"特意蹲守日落并拍摄美景"},
    {name:"守住热爱",desc:"有一件爱好坚持5年以上从未放弃"},
    {name:"首次远行",desc:"第一次离开家乡到陌生城市生活"},
    {name:"难道我是天才",desc:"学生时代考试拿过满分"},
    {name:"安装乐器DLC",desc:"熟练掌握一种乐器"},
    {name:"乐坛赴约",desc:"去过现场观看演唱会"},
    {name:"全款置业",desc:"无贷款独立购买房产"},
    {name:"内卷达人",desc:"非上课时间一天学习超过10小时"},
    {name:"顶峰登临",desc:"徒步登顶高山观景"},
    {name:"心灵手巧",desc:"独立完成手工DIY成品制作"},
    {name:"故人走散",desc:"曾经无话不谈的朋友现在已经渐渐疏远"},
    {name:"山野露营",desc:"体验过户外野外露营"},
    {name:"误闯天家",desc:"原本只是想通过浏览器搜索资料，结果......"},
    {name:"真心羁绊",desc:"拥有相处十年以上无条件信任挚友"},
    {name:"追剧达人",desc:"完整追完十部长篇剧集"},
    {name:"通宵达人",desc:"凌晨三点依旧清醒熬夜"},
    {name:"遗憾离场",desc:"认真爱过一人最终没能走到最后"},
    {name:"驾照猎人",desc:"考取驾照解锁机动车驾驶权限"},
    {name:"说走就走",desc:"临时规划来一场即兴旅行"},
    {name:"自律传说",desc:"长期早睡早起三餐规律心态稳定"},
    {name:"初心未改",desc:"成年后依旧守住年少时的热爱"},
    {name:"空想行动派",desc:"想法很多却迟迟不肯动手落实"},
    {name:"观影达人",desc:"一年累计观看电影超三十部"},
    {name:"自我救赎",desc:"低谷时期靠自己走出情绪阴霾"},
    {name:"子嗣DLC",desc:"生育子女，并开启高难度支线副本"},
    {name:"经济断奶",desc:"实现经济独立不再依靠家里"},
    {name:"外卖至尊VIP",desc:"连续整月三餐全部吃外卖"},
    {name:"初恋支线",desc:"触发人生第一次心动恋爱剧情"},
    {name:"自驾游历",desc:"拥有独自自驾旅行经历"},
    {name:"拖延症患者",desc:"凡事习惯拖到最后截止日期"},
    {name:"千里赴约",desc:"跨越多个城市奔赴想见的人"},
    {name:"垂钓闲人",desc:"闲暇时间喜欢户外垂钓放松"},
    {name:"极简社交者",desc:"只维系三个以内亲密好友"},
    {name:"语言能力DLC",desc:"熟练掌握一门外语"},
    {name:"学有所成",desc:"顺利完成高等教育拿到大学毕业证"},
    {name:"厨艺觉醒",desc:"能够独立做出一桌家常菜，零黑暗料理"},
    {name:"方言精通",desc:"熟练掌握两种及以上地方方言"},
    {name:"财富自由",desc:"收入富足，此生不必为生计钱财奔波操劳"},
    {name:"海外打卡",desc:"有过出境旅行游玩经历"},
    {name:"双向钟情",desc:"告白喜欢的人刚好对方也喜欢你"},
    {name:"不眠者",desc:"日常平均睡眠时间不足七小时"},
    {name:"月光战神",desc:"每月工资到手很快全部花光，存款永远趋近归零"},
    {name:"人形闹钟",desc:"有过二十四小时以上不睡觉经历"},
    {name:"第一份工作",desc:"拥有属于自己的第一份正式工作"},
    {name:"长期单身",desc:"成年后超过三年保持单身状态"},
    {name:"异乡打工人",desc:"常年在外打拼很少回家，一年不超过两次"},
    {name:"我停不下来",desc:"一天超过八小时对着手机、电脑屏幕"},
    {name:"勇敢独行",desc:"独自出门远行游玩无任何人陪同"}
];

let nowIndex = 0;
let userResult = new Array(60).fill(false);
let userName = "";

let statData = JSON.parse(localStorage.getItem('achStat')) || {
    totalUser:0,
    doneCount:new Array(60).fill(0)
};

// 开始测试
function startTest() {
    let nick = document.getElementById("nickInput").value.trim();
    if (!nick) {
        alert("请输入昵称");
        return;
    }
    userName = nick;
    document.getElementById("startPage").style.display = "none";
    document.getElementById("answerPage").style.display = "block";
    renderQues();
}

// 每次重新渲染卡片，动画自动触发
function renderQues() {
    document.getElementById("progressText").innerText = `进度：${nowIndex+1}/60`;
    let item = achData[nowIndex];
    let container = document.getElementById("qContainer");

    let btnHtml = nowIndex === 0
        ? `<div class="single-btn-row"><button class="opt-btn yes-btn single-yes" onclick="selectYes()">确认达成</button></div>`
        : `<div class="btn-row"><button class="opt-btn yes-btn" onclick="selectYes()">已达成</button><button class="opt-btn no-btn" onclick="selectNo()">未达成</button></div>`;

    container.innerHTML = `
    <div class="q-box-wrapper">
        <div class="q-box">
            <div class="q-title">${item.name}</div>
            <div class="q-desc">${item.desc}</div>
            ${btnHtml}
        </div>
    </div>`;
}

function selectYes() {
    userResult[nowIndex] = true;
    next();
}
function selectNo() {
    userResult[nowIndex] = false;
    next();
}

function next() {
    nowIndex++;
    if (nowIndex >= 60) {
        submit();
        showResult();
        return;
    }
    renderQues();
}

// 统计
function submit() {
    statData.totalUser++;
    for (let i=0;i<60;i++) {
        if (userResult[i]) statData.doneCount[i]++;
    }
    localStorage.setItem('achStat', JSON.stringify(statData));
}

// 结果
function showResult() {
    document.getElementById("answerPage").style.display = "none";
    document.getElementById("resultPage").style.display = "block";
    let num = userResult.filter(i=>i).length;
    document.getElementById("totalInfo").innerText = 
        `${userName}，你完成了 ${num} 项成就 | 已有${statData.totalUser}人测试`;

    let html = "";
    achData.forEach((item,i)=>{
        let ok = userResult[i];
        let r = statData.totalUser ? ((statData.doneCount[i]/statData.totalUser*100).toFixed(1)) : 0;
        html += `
        <div class="ach-item ${ok?'done':'undone'}">
            <div>${ok?"✅":"❌"} ${item.name}</div>
            <div style="color:#ccc;margin:3px 0;">${item.desc}</div>
            <div style="font-size:10px;color:#aaa">${r}%达成</div>
        </div>`;
    });
    document.getElementById("achList").innerHTML = html;
}

// 保存图片
function saveResultImage() {
    html2canvas(document.getElementById("saveBox"),{
        scale:2, backgroundColor:"#0f1118"
    }).then(canvas=>{
        let a = document.createElement("a");
        a.download = "地球Online成就清单.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
    });
}
</script>
</body>
</html>
